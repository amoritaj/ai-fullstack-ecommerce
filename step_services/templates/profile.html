<!DOCTYPE html>
<html>

<head>

<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
font-family:Segoe UI;
color:white;
}

/* الكرت */
.profile-box{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(12px);
border-radius:20px;
padding:40px;
max-width:500px;
margin:auto;
margin-top:80px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
animation: fadeIn 0.6s ease;
}

/* صورة البروفايل */
.profile-icon{
font-size:70px;
color:#26a69a;
margin-bottom:15px;
}

/* المعلومات */
.info{
background: rgba(255,255,255,0.1);
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* أزرار */
.btn-custom{
background:#26a69a;
border:none;
border-radius:10px;
color:white;
transition:0.3s;
}

.btn-custom:hover{
background:#1f8e83;
transform: scale(1.05);
box-shadow:0 0 15px #26a69a;
}

/* animation */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="profile-box text-center">

<i class="fas fa-user-circle profile-icon"></i>

<h3 class="mb-3">{{ session['username'] }}</h3>

<div class="info">
📞 Phone: {{ user[1] }}
</div>

<div class="info">
🆔 User ID: {{ session['user_id'] }}
</div>

<div class="mt-4">

<a href="/change-password" class="btn btn-custom w-100 mb-2">
<i class="fas fa-key"></i> Change Password
</a>

<a href="/services" class="btn btn-light w-100 mb-2">
Back to Services
</a>

<a href="/logout" class="btn btn-danger w-100">
Logout
</a>

</div>

</div>

</body>

</html>
