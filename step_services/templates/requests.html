<!DOCTYPE html>
<html>

<head>

<title>Customer Requests</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="p-4">

<h2 class="mb-4">Customer Requests</h2>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Service</th>
<th>Phone</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for row in rows %}
<tr>

<td>{{ row[0] }}</td>  <!-- ID -->
<td>{{ row[1] }}</td>  <!-- Name -->
<td>{{ row[2] }}</td>  <!-- Service -->
<td>{{ row[3] }}</td>  <!-- Phone -->
<td>{{ row[4] }}</td>  <!-- Date -->
<td>{{ row[5] }}</td>  <!-- Status -->

<td>
<a href="/done/{{ row[0] }}" class="btn btn-success btn-sm">Done</a>
<a href="/delete/{{ row[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>

</tr>
{% endfor %}

</tbody>

</table>


<button onclick="history.back()" 
style="position:fixed; bottom: 60px;; left:60px; z-index:999;"
class="btn btn-dark">
<h1>BACK⬅️</h1>
</button>

</body>
</html>
