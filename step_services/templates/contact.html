<!DOCTYPE html>
<html>

<head>

<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
 

body{
background: linear-gradient(135deg,#26a69a,#90d1cd,#ffffff);
color:white;
}

/* الكرت */
.contact-card{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(12px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* inputs */
.form-control{
border-radius:10px;
border:none;
}

       /*زر متحرك (Neon Butto*/

.btn-send{
    background: linear-gradient(45deg,#26a69a,#00e676);
    border:none;
    transition:0.3s;
}
.btn-send:hover{
    box-shadow:0 0 15px #26a69a, 0 0 30px #00e67700;
    transform: scale(1.05);
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">📞 Contact Us</h2>

<div class="row justify-content-center">

<div class="col-md-8">

<div class="contact-card">

<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Your Name" required>

<input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

<textarea name="message" class="form-control mb-3" rows="4" placeholder="Your Message"></textarea>

<button class="btn btn-send w-100">Send Message</button>

</form>

{% if success %}
<div class="alert alert-success mt-3">
Message sent successfully ✅
</div>
{% endif %}

</div>

</div>

</div>

</div>
<button onclick="history.back()" 
style="position:fixed; bottom: 60px;; left:60px; z-index:999;"
class="btn btn-dark">
<h1>BACK⬅️</h1>
</button>

</body>

</html>
