<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/*الشعار*/
.logo-container {
    position: absolute;
    top: 60px;
    width: 100%;
    text-align: center;
    z-index: 2;
}

.logo-img {
    width: 140px;
    margin-bottom: 10px;
}

.logo-text {
    color: white;   /* 🔥 النص أبيض */
    font-weight: bold;
    letter-spacing: 1px;
}

#plane3d {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;   /* 🔥 يغطي الشاشة كاملة */
    z-index: -1;
    overflow: hidden;
}

.login-box {
    position: relative;
    z-index: 2;
}

body{
height:100vh;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
}

/* الكرت */
.login-box{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(12px);
padding:40px;
border-radius:20px;
width:360px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
animation: fadeIn 0.6s ease;
}

/* العنوان */
.login-title{
color:white;
text-align:center;
margin-bottom:20px;
font-weight:bold;
}

/* inputs */
.form-control{
border-radius:10px;
border:none;
padding:10px;
}

/* focus */
.form-control:focus{
box-shadow:0 0 10px rgba(38,166,154,0.5);
}

/* زر */
.btn-login{
background:#26a69a;
color:white;
border:none;
border-radius:10px;
transition:0.3s;
}

.btn-login:hover{
background:#1f8e83;
transform: scale(1.05);
box-shadow:0 0 15px #26a69a;
}

/* error */
.alert{
border-radius:10px;
animation: shake 0.3s;
}

/* حركة */
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* show password */
.password-box{
position:relative;
}

.password-box i{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#555;
}

a{
color:#26a69a;
text-decoration:none;
}

</style>

</head>

<body>

<div class="logo-container text-center">

    <img src="/static/logo.png" class="logo-img">

    <h2 class="logo-text">Step for Public Services</h2>

</div>

<div id="plane3d"></div>

<div class="login-box">

<h3 class="login-title">
<i class="fas fa-lock"></i> Step Services
</h3>

{% if error %}
<div class="alert alert-danger text-center">
    {{ error }}
</div>
{% endif %}

<form action="/" method="POST">

<input class="form-control mb-3" name="username" placeholder="Username" required>

<div class="password-box mb-3">
<input id="password" class="form-control" type="password" name="password" placeholder="Password" required>
<i class="fas fa-eye" onclick="togglePassword()"></i>
</div>

<button class="btn btn-login w-100">
Login
</button>

<p class="text-center mt-3 text-light">
Don't have an account?
<a href="/signup">Create Account</a>
</p>

</form>

</div>

<script>

function togglePassword(){
    let p = document.getElementById("password");
    p.type = (p.type === "password") ? "text" : "password";
}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("plane3d").appendChild(renderer.domElement);

// ✨ إضاءة
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));

// ✈️ تحميل الطيارة
const loader = new THREE.GLTFLoader();
let plane = null;

loader.load('/static/plane.glb', function(gltf){

    plane = gltf.scene;

    plane.scale.set(0.18, 0.18, 0.18);
    plane.position.set(0, 2, -4);
    plane.rotation.y = Math.PI / 2;

    scene.add(plane);

});

// 🎥 الكاميرا
camera.position.set(0, 7, 12);

// 🎮 متغير الاتجاه
let direction = 2;

// 🖱️ الماوس
let mouseY = 5;

window.addEventListener("mousemove", (e) => {
    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// 🚀 الحركة
let angle = 0;

function animate() {
    requestAnimationFrame(animate);

    if (plane) {

        angle += 0.009; // السرعة

        // 🌀 مسار واسع يغطي الشاشة
        let x = Math.cos(angle) * 18;   // عرض كامل
        let z = Math.sin(angle) * 14 - 12; // عمق
        let y = 2 + Math.sin(angle * 2) * 0.5;

        plane.position.set(x, y, z);

        // ✨ توجيه الطيارة
        plane.rotation.y = -angle;

        // ميلان خفيف
        plane.rotation.z = Math.sin(angle) * 0.6;

        // 😈 تفاعل مع الماوس
        plane.position.y += mouseY * 2;
    }

    renderer.render(scene, camera);
}
animate();

// 📱 ريسايز مضبوط
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>

</html>
