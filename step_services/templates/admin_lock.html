<!DOCTYPE html>
<html>

<head>

<title>Admin Access</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

body{

background: linear-gradient(135deg,#26a69a,#90d1cd,#ffffff);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(8px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
width:350px;
}

/* الكرت */
.contact-card{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(12px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* inputs */
.form-control{
border-radius:10px;
border:none;
}

.btn-send{
background:#26a69a;
color:white;
}

</style>

</head>

<body>

<div class="card">

<h5 class="mb-3">🔐 دخول الإدارة</h5>

<p class="text-muted">
هذه الصفحة مخصصة للإدارة فقط حفاظاً على بيانات العملاء
</p>

<form method="POST">

<input type="password" name="admin_code"
class="form-control mb-3"
placeholder="أدخل رمز الإدارة">

<button class="btn btn-send w-100">دخول</button>


</form>

{% if error %}
<p style="color:red; margin-top:10px;">
{{ error }}
</p>
{% endif %}

<a href="/services" class="btn btn-send mt-3 w-100">رجوع
</a>

</div>

</body>

</html>
