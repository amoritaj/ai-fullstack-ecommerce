<!DOCTYPE html>

<html>

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
display:flex;
font-family:Segoe UI;
background:#f4f4f4;
}

.sidebar{
width:220px;
background:#26a69a;
height:100vh;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
margin:15px 0;
text-decoration:none;
}

.content{
flex:1;
padding:40px;
}

.stat-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

</style>

</head>

<canvas id="pieChart"></canvas>

<script>

const services = {{ services | default([]) | tojson }};
const counts = {{ counts | default([]) | tojson }};

new Chart(document.getElementById('pieChart'), {

type:'pie',

data:{
labels:services,
datasets:[{
data:counts,
backgroundColor:[
'#26a69a',
'#42a5f5',
'#ff7043',
'#66bb6a',
'#ab47bc'
]
}]
}

});

</script>

<h3 class="mb-4">Service Analytics</h3>

<canvas id="serviceChart"></canvas>

<script>

const services = {{ services | default([]) | tojson }};
const counts = {{ counts | default([]) | tojson }};

const ctx = document.getElementById('serviceChart');

new Chart(ctx, {

type:'bar',

data:{
labels:services,
datasets:[{
label:'Requests',
data:counts,
backgroundColor:'#26a69a'
}]
}

});



</script>

<button onclick="history.back()" 
style="position:fixed; bottom:20px; left:20px; z-index:999;"
class="btn btn-dark">
⬅️
</button>
